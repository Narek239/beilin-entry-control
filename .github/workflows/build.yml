# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: common
            task: ":common:build"
            java: "21"
          - name: platform-1.19.2
            task: ":platform-fabric-1.19.2:build"
            java: "21"
          - name: platform-1.20.1
            task: ":platform-fabric-1.20.1:build"
            java: "21"
          - name: platform-1.21.x
            task: ":platform-fabric-1.21.x:build"
            java: "21"
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: setup jdk
        uses: actions/setup-java@v4
        with:
          java-version: '${{ matrix.java }}'
          distribution: 'temurin'
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build (${{ matrix.name }})
        run: ./gradlew ${{ matrix.task }}
      - name: capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts-${{ matrix.name }}
          path: |
            common/build/libs/*.jar
            platform-fabric-1.19.2/build/libs/*.jar
            platform-fabric-1.20.1/build/libs/*.jar
            platform-fabric-1.21.x/build/libs/*.jar
